    <style>
        /* 跑马灯样式 */
        .marquee-container {
            background: var(--glass-bg);
            padding: 10px 0;
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .marquee-content {
            white-space: nowrap;
            animation: marquee-scroll 30s linear infinite;
            color: var(--primary-color);
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        @keyframes marquee-scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        /* 页面进入动画 */
        body {
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 导航栏和内容的延迟动画 */
        .navbar {
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
            opacity: 0;
            transform: translateY(50px);
        }
        
        .container {
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
            opacity: 0;
            transform: translateY(50px);
        }
    </style>
</head>

        // 加载跑马灯公告
        function loadMarqueeNotice() {
            const data = localStorage.getItem('noticeList');
            let notices = [];
            if (data) {
                notices = JSON.parse(data).filter(item => item.type === 'marquee' && item.status === 1);
            }
            
            // 如果没有公告，使用默认公告
            if (notices.length === 0) {
                notices = [{ content: '欢迎来到化学世界！探索元素的奥秘。' }, { content: '新增元素游戏功能，快来体验！' }];
            }
            
            const container = document.getElementById('marquee-container');
            const content = document.getElementById('marquee-content');
            
            container.style.display = 'block';
            content.innerHTML = notices.map(n => n.content).join('    |    ');
        }

        // 主题切换功能
        function initTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            
            if (!themeToggle) return;
            
            // 读取保存的主题设置
            const savedTheme = localStorage.getItem('theme') || 'dark';
            
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-mode');
                themeToggle.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    </svg>
                    <span id="theme-text">深色模式</span>
                `;

        // 初始化
        function init() {
            updateLanguageUI();
            renderElements();
            setupEventListeners();
            loadMarqueeNotice();
        }

        // 更新语言UI
        function updateLanguageUI() {
            // 更新导航链接
            document.querySelectorAll('[data-lang-key]').forEach(element => {
                const key = element.dataset.langKey;
                if (translations[currentLang][key]) {
                    if (element.tagName === 'INPUT') {
                        element.placeholder = translations[currentLang][key];
                    } else {
                        element.textContent = translations[currentLang][key];
                    }
                }
            });

            // 更新游戏链接
            const gamesLink = document.querySelector('a[data-lang-key="games"]');
            if (gamesLink) {
                gamesLink.href = currentLang === 'chinese' ? 'games/chinese/games.html' : 'games/english/games.html';
            }

            // 更新滑动指示器
            const slideIndicator = document.querySelector('.slide-indicator');
            if (slideIndicator) {
                slideIndicator.className = 'slide-indicator';
                slideIndicator.classList.add(currentLang);
            }
        }

        // 渲染元素
        function renderElements() {
            const elementList = document.getElementById('element-list');
            if (!elementList) return;

            elementList.innerHTML = '';

            currentElements.forEach(element => {
                const link = document.createElement('a');
                link.href = element.link;
                link.classList.add('element-link');
                if (element.category) {
                    link.classList.add(element.category);
                }
                link.innerHTML = `
                    <div class="element-number">${element.atomicNumber || ''}</div>
                    <div class="element-symbol">${element.symbol || ''}</div>
                    <div class="element-name">${element.name}</div>
                `;
                elementList.appendChild(link);
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 汉堡菜单
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.querySelector('.nav-links');
            if (menuToggle && navLinks) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }

            // 语言切换
            const taskbarBtns = document.querySelectorAll('.taskbar-btn');
            taskbarBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const newLang = this.dataset.lang;
                    if (newLang === currentLang) return;

                    currentLang = newLang;
                    currentElements = elementsData[currentLang];

                    updateLanguageUI();
                    renderElements();
                });
            });

            // 搜索功能
            const searchBox = document.getElementById('search-box');
            const searchBtn = document.getElementById('search-btn');
            const elementList = document.getElementById('element-list');
            if (searchBox && searchBtn && elementList) {
                // 搜索历史
                function getSearchHistory() {
                    try {
                        return JSON.parse(localStorage.getItem('searchHistory') || '[]');
                    } catch (e) {
                        console.error('Error getting search history:', e);
                        return [];
                    }
                }

                function addToSearchHistory(term) {
                    if (!term) return;
                    try {
                        let history = getSearchHistory();
                        // 移除重复项
                        history = history.filter(item => item !== term);
                        // 添加到开头
                        history.unshift(term);
                        // 保留最近5次搜索
                        history = history.slice(0, 5);
                        localStorage.setItem('searchHistory', JSON.stringify(history));
                    } catch (e) {
                        console.error('Error adding to search history:', e);
                    }
                }

                // 高亮匹配结果
                function highlightText(text, searchTerm) {
                    if (!searchTerm) return text;
                    const regex = new RegExp(`(${searchTerm})`, 'gi');
                    return text.replace(regex, '<span class="highlight">$1</span>');
                }

                // 检查拼音匹配
                function matchesPinyin(elementName, searchTerm) {
                    if (currentLang !== 'chinese') return false;
                    const pinyin = pinyinMap[elementName] || '';
                    return pinyin.includes(searchTerm) || 
                           pinyin.split('').map(char => char[0]).join('').includes(searchTerm); // 首字母匹配
                }

                function searchElements() {
                    const searchTerm = searchBox.value.toLowerCase().trim();
                    const elementLinks = document.querySelectorAll('.element-link');
                    let hasResults = false;

                    // 保存搜索历史
                    if (searchTerm) {
                        addToSearchHistory(searchTerm);
                    }

                    elementLinks.forEach(link => {
                        const elementName = link.querySelector('.element-name').textContent;
                        const elementSymbol = link.querySelector('.element-symbol').textContent.toLowerCase().trim();
                        const elementNumber = link.querySelector('.element-number').textContent.trim();

                        const matchesName = elementName.toLowerCase().includes(searchTerm);
                        const matchesSymbol = elementSymbol.includes(searchTerm);
                        const matchesNumber = elementNumber.includes(searchTerm);
                        const matchesPinyinResult = matchesPinyin(elementName, searchTerm);

                        const matchesSearch = matchesName || matchesSymbol || matchesNumber || matchesPinyinResult;

                        if (matchesSearch) {
                            link.style.display = 'flex';
                            hasResults = true;
                            
                            // 高亮匹配结果
                            if (searchTerm) {
                                link.querySelector('.element-name').innerHTML = highlightText(elementName, searchTerm);
                                link.querySelector('.element-symbol').innerHTML = highlightText(link.querySelector('.element-symbol').textContent, searchTerm);
                                link.querySelector('.element-number').innerHTML = highlightText(link.querySelector('.element-number').textContent, searchTerm);
                            }
                        } else {
                            link.style.display = 'none';
                        }
                    });

                    // 显示无结果提示
                    const noResultsElement = document.getElementById('no-results');
                    if (noResultsElement) {
                        noResultsElement.remove();
                    }

                    if (!hasResults && searchTerm) {
                        const noResults = document.createElement('div');
                        noResults.id = 'no-results';
                        noResults.className = 'no-results';
                        noResults.textContent = translations[currentLang]['no-results'] || '无匹配结果';
                        elementList.parentNode.insertBefore(noResults, elementList.nextSibling);
                    }
                }

                searchBtn.addEventListener('click', searchElements);
                searchBox.addEventListener('input', searchElements);
                searchBox.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        searchElements();
                    }
                });

                // 搜索历史提示
                searchBox.addEventListener('focus', () => {
                    const history = getSearchHistory();
                    if (history.length > 0) {
                        const historyElement = document.createElement('div');
                        historyElement.className = 'search-history';
                        historyElement.id = 'search-history';
                        
                        historyElement.innerHTML = `
                            <div class="history-title">${translations[currentLang]['search-history'] || '搜索历史'}</div>
                            <ul>
                                ${history.map(term => `<li>${term}</li>`).join('')}
                            </ul>
                        `;
                        
                        // 移除已存在的历史提示
                        const existingHistory = document.getElementById('search-history');
                        if (existingHistory) {
                            existingHistory.remove();
                        }
                        
                        searchBox.parentNode.appendChild(historyElement);
                        
                        // 点击历史项
                        historyElement.querySelectorAll('li').forEach(item => {
                            item.addEventListener('click', () => {
                                searchBox.value = item.textContent;
                                searchElements();
                                historyElement.remove();
                            });
                        });
                    }
                });

                // 点击其他地方关闭历史提示
                document.addEventListener('click', (e) => {
                    const historyElement = document.getElementById('search-history');
                    if (historyElement && !searchBox.contains(e.target) && !historyElement.contains(e.target)) {
                        historyElement.remove();
                    }
                });
            }

            // 视图切换
            const viewToggleBtns = document.querySelectorAll('.view-toggle-btn');
            const gridView = document.getElementById('element-list');
            const periodicView = document.querySelector('.periodic-table-container');
            if (viewToggleBtns && gridView && periodicView) {
                viewToggleBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const view = this.dataset.view;

                        // 更新按钮状态
                        viewToggleBtns.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');

                        // 显示/隐藏对应视图
                        if (view === 'grid') {
                            gridView.style.display = 'flex';
                            periodicView.style.display = 'none';
                        } else if (view === 'periodic') {
                            gridView.style.display = 'none';
                            periodicView.style.display = 'block';
                            generatePeriodicTable();
                        }
                    });
                });
            }

            // 筛选功能
            const filterBtns = document.querySelectorAll('.filter-btn');
            if (filterBtns) {
                filterBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        const filter = this.dataset.filter;

                        // 更新按钮状态
                        filterBtns.forEach(b => b.classList.remove('active'));
                        this.classList.add('active');

                        // 应用筛选
                        const elementLinks = document.querySelectorAll('.element-link');
                        elementLinks.forEach(link => {
                            if (filter === 'all' || link.classList.contains(filter)) {
                                link.style.display = 'flex';
                            } else {
                                link.style.display = 'none';
                            }
                        });
                    });
                });
            }
        }

        // 生成周期表
        function generatePeriodicTable() {
            const periodicTable = document.getElementById('periodic-table');
            if (!periodicTable) return;

            periodicTable.innerHTML = '';

            // 周期表布局数据
            const periodicLayout = [
                [1],
                [2],
                [3, 4, null, null, null, null, null, null, null, null, null, null, 5, 6, 7, 8, 9, 10],
                [11, 12, null, null, null, null, null, null, null, null, null, null, 13, 14, 15, 16, 17, 18],
                [19, 20, null, null, null, null, null, null, null, null, null, null, 31, 32, 33, 34, 35, 36],
                [37, 38, null, null, null, null, null, null, null, null, null, null, 49, 50, 51, 52, 53, 54],
                [55, 56, null, null, null, null, null, null, null, null, null, null, 81, 82, 83, 84, 85, 86],
                [87, 88]
            ];

            // 遍历周期表布局
            periodicLayout.forEach(row => {
                row.forEach(atomicNumber => {
                    if (atomicNumber) {
                        const element = currentElements.find(el => el.atomicNumber === atomicNumber);
                        if (element) {
                            const periodicElement = document.createElement('a');
                            periodicElement.href = element.link;
                            periodicElement.classList.add('periodic-element');
                            if (element.category) {
                                periodicElement.classList.add(element.category);
                            }
                            periodicElement.innerHTML = `
                                <div class="element-number">${element.atomicNumber}</div>
                                <div class="element-symbol">${element.symbol}</div>
                                <div class="element-name">${element.name}</div>
                            `;
                            periodicTable.appendChild(periodicElement);
                        }
                    } else {
                        // 创建空白元素
                        const emptyElement = document.createElement('div');
                        emptyElement.style.minWidth = '60px';
                        emptyElement.style.height = '60px';
                        periodicTable.appendChild(emptyElement);
                    }
                });
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
