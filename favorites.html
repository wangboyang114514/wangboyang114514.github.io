<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收藏夹 | Favorites</title>
    <link rel="stylesheet" href="styles.css">
    <script src="interaction.js"></script>
    <style>
        /* 页面进入动画 */
        body {
            opacity: 0;
            transform: translateY(50px);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 导航栏和内容的延迟动画 */
        .navbar {
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
            opacity: 0;
            transform: translateY(50px);
        }
        
        .container {
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
            opacity: 0;
            transform: translateY(50px);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="site-title">
                <img src="photo/loge.png" class="logo" alt="Logo">
                Chemistry World
            </a>
            <ul class="nav-links">
                <li><a href="index.html" data-lang-key="home">首页</a></li>
                <li><a href="elements.html" data-lang-key="elements">元素列表</a></li>
                <li><a href="favorites.html" data-lang-key="favorites">收藏夹</a></li>
                <li><a href="games/chinese/games.html" data-lang-key="games">化学游戏</a></li>
            </ul>
            <!-- 苹果音乐app风格任务栏 -->
            <div class="apple-taskbar">
                <button class="taskbar-btn" data-lang="chinese">中文</button>
                <button class="taskbar-btn" data-lang="english">English</button>
                <div class="slide-indicator chinese"></div>
            </div>
            <div class="menu-toggle" id="menuToggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container">
        <h1 data-lang-key="favorites-title">我的收藏</h1>
        
        <div class="favorites-container" id="favorites-container">
            <!-- 收藏的元素将在这里动态生成 -->
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>&copy; 2024 Chemistry World. All rights reserved.</p>
    </footer>

    <script>
        // 语言数据
        const translations = {
            chinese: {
                home: "首页",
                elements: "元素列表",
                favorites: "收藏夹",
                games: "化学游戏",
                "favorites-title": "我的收藏",
                "no-favorites": "暂无收藏元素",
                "remove-favorite": "取消收藏",
                "view-details": "查看详情"
            },
            english: {
                home: "Home",
                elements: "Elements",
                favorites: "Favorites",
                games: "Chemistry Games",
                "favorites-title": "My Favorites",
                "no-favorites": "No favorite elements yet",
                "remove-favorite": "Remove from favorites",
                "view-details": "View details"
            }
        };

        // 当前语言
        let currentLang = 'chinese';

        // 初始化
        function init() {
            updateLanguageUI();
            loadFavorites();
            setupEventListeners();
        }

        // 更新语言UI
        function updateLanguageUI() {
            // 更新导航链接
            document.querySelectorAll('[data-lang-key]').forEach(element => {
                const key = element.dataset.langKey;
                if (translations[currentLang][key]) {
                    element.textContent = translations[currentLang][key];
                }
            });

            // 更新游戏链接
            const gamesLink = document.querySelector('a[data-lang-key="games"]');
            if (gamesLink) {
                gamesLink.href = currentLang === 'chinese' ? 'games/chinese/games.html' : 'games/english/games.html';
            }

            // 更新滑动指示器
            const slideIndicator = document.querySelector('.slide-indicator');
            if (slideIndicator) {
                slideIndicator.className = 'slide-indicator';
                slideIndicator.classList.add(currentLang);
            }
        }

        // 加载收藏的元素
        function loadFavorites() {
            const favoritesContainer = document.getElementById('favorites-container');
            if (!favoritesContainer) return;

            try {
                const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                
                if (favorites.length === 0) {
                    favoritesContainer.innerHTML = `
                        <div class="no-favorites">
                            <h3>${translations[currentLang]['no-favorites']}</h3>
                            <p>浏览元素列表，点击 ❤️ 按钮添加收藏</p>
                            <a href="elements.html" class="btn">${translations[currentLang]['elements'] || '元素列表'}</a>
                        </div>
                    `;
                    return;
                }

                favoritesContainer.innerHTML = `
                    <div class="favorites-header">
                        <h3>${translations[currentLang]['favorites-title'] || '我的收藏'} (${favorites.length})</h3>
                        <div class="favorites-actions">
                            <button class="btn bulk-remove-btn" data-lang-key="remove-favorite">${translations[currentLang]['remove-favorite'] || '批量取消收藏'}</button>
                            <button class="btn export-btn">导出收藏</button>
                            <input type="file" id="import-file" style="display: none;" accept=".json">
                            <button class="btn import-btn">导入收藏</button>
                        </div>
                    </div>
                    <div class="favorites-list"></div>
                `;

                const favoritesList = favoritesContainer.querySelector('.favorites-list');
                
                favorites.forEach(element => {
                    const favoriteCard = document.createElement('div');
                    favoriteCard.className = 'favorite-card';
                    favoriteCard.dataset.name = element.name;
                    favoriteCard.innerHTML = `
                        <div class="favorite-checkbox">
                            <input type="checkbox" class="favorite-checkbox-input">
                        </div>
                        <div class="favorite-info">
                            <h3>${element.name}</h3>
                            <div class="element-meta">
                                <span class="element-symbol">${element.symbol}</span>
                                <span class="element-number">${element.atomicNumber}</span>
                                <span class="element-category">${getCategoryName(element.category)}</span>
                            </div>
                        </div>
                        <div class="favorite-actions">
                            <button class="btn view-btn" data-lang-key="view-details">${translations[currentLang]['view-details'] || '查看详情'}</button>
                            <button class="btn remove-btn" data-lang-key="remove-favorite">${translations[currentLang]['remove-favorite'] || '取消收藏'}</button>
                        </div>
                    `;
                    favoritesList.appendChild(favoriteCard);

                    // 添加事件监听器
                    const removeBtn = favoriteCard.querySelector('.remove-btn');
                    removeBtn.addEventListener('click', () => {
                        removeFavorite(element.name);
                    });

                    const viewBtn = favoriteCard.querySelector('.view-btn');
                    viewBtn.addEventListener('click', () => {
                        // 跳转到元素详情页
                        const link = currentLang === 'chinese' ? 
                            `chinese/${element.atomicNumber.toString().padStart(2, '0')}${element.symbol}.html` : 
                            `english/${element.atomicNumber}_${element.name}.html`;
                        window.location.href = link;
                    });
                });

                // 批量操作
                const bulkRemoveBtn = favoritesContainer.querySelector('.bulk-remove-btn');
                bulkRemoveBtn.addEventListener('click', () => {
                    const checkedCheckboxes = favoritesContainer.querySelectorAll('.favorite-checkbox-input:checked');
                    if (checkedCheckboxes.length === 0) {
                        showToast('请选择要取消收藏的元素', 1000);
                        return;
                    }
                    
                    const elementNames = Array.from(checkedCheckboxes).map(checkbox => 
                        checkbox.closest('.favorite-card').dataset.name
                    );
                    
                    bulkRemoveFavorites(elementNames);
                });

                // 导出功能
                const exportBtn = favoritesContainer.querySelector('.export-btn');
                exportBtn.addEventListener('click', () => {
                    exportFavorites();
                });

                // 导入功能
                const importBtn = favoritesContainer.querySelector('.import-btn');
                const importFileInput = document.getElementById('import-file');
                
                importBtn.addEventListener('click', () => {
                    importFileInput.click();
                });

                importFileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        importFavorites(file);
                    }
                });

            } catch (error) {
                console.error('Error loading favorites:', error);
                favoritesContainer.innerHTML = '<p>加载收藏失败</p>';
            }
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categoryMap = {
                chinese: {
                    metal: '金属',
                    nonmetal: '非金属',
                    metalloid: '类金属',
                    'noble-gas': '稀有气体',
                    'alkali-metal': '碱金属',
                    'alkaline-earth-metal': '碱土金属',
                    halogen: '卤素',
                    other: '其他'
                },
                english: {
                    metal: 'Metal',
                    nonmetal: 'Nonmetal',
                    metalloid: 'Metalloid',
                    'noble-gas': 'Noble Gas',
                    'alkali-metal': 'Alkali Metal',
                    'alkaline-earth-metal': 'Alkaline Earth Metal',
                    halogen: 'Halogen',
                    other: 'Other'
                }
            };
            return categoryMap[currentLang][category] || category;
        }

        // 移除收藏
        function removeFavorite(elementName) {
            try {
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = favorites.filter(item => item.name !== elementName);
                localStorage.setItem('favorites', JSON.stringify(favorites));
                loadFavorites();
                showToast('已取消收藏', 1000);
            } catch (error) {
                console.error('Error removing favorite:', error);
                showToast('操作失败，请重试', 1000);
            }
        }

        // 批量移除收藏
        function bulkRemoveFavorites(elementNames) {
            try {
                let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                favorites = favorites.filter(item => !elementNames.includes(item.name));
                localStorage.setItem('favorites', JSON.stringify(favorites));
                loadFavorites();
                showToast(`已取消收藏 ${elementNames.length} 个元素`, 1000);
            } catch (error) {
                console.error('Error bulk removing favorites:', error);
                showToast('操作失败，请重试', 1000);
            }
        }

        // 导出收藏
        function exportFavorites() {
            try {
                const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                const dataStr = JSON.stringify(favorites, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `chemistry-world-favorites-${new Date().toISOString().slice(0, 10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showToast('收藏已导出', 1000);
            } catch (error) {
                console.error('Error exporting favorites:', error);
                showToast('导出失败，请重试', 1000);
            }
        }

        // 导入收藏
        function importFavorites(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedFavorites = JSON.parse(e.target.result);
                    if (Array.isArray(importedFavorites)) {
                        // 合并收藏，去重
                        let existingFavorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                        const existingNames = new Set(existingFavorites.map(item => item.name));
                        const newFavorites = importedFavorites.filter(item => !existingNames.has(item.name));
                        existingFavorites = [...existingFavorites, ...newFavorites];
                        localStorage.setItem('favorites', JSON.stringify(existingFavorites));
                        loadFavorites();
                        showToast(`成功导入 ${newFavorites.length} 个收藏`, 1000);
                    } else {
                        showToast('导入失败：无效的文件格式', 1000);
                    }
                } catch (error) {
                    console.error('Error importing favorites:', error);
                    showToast('导入失败，请检查文件格式', 1000);
                }
            };
            reader.readAsText(file);
        }

        // 显示提示
        function showToast(message, duration) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '24px';
            toast.style.zIndex = '1000';
            toast.style.transition = 'opacity 0.3s ease';
            toast.style.opacity = '0';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, duration);
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 汉堡菜单
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.querySelector('.nav-links');
            if (menuToggle && navLinks) {
                menuToggle.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }

            // 语言切换
            const taskbarBtns = document.querySelectorAll('.taskbar-btn');
            taskbarBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const newLang = this.dataset.lang;
                    if (newLang === currentLang) return;

                    currentLang = newLang;
                    updateLanguageUI();
                    loadFavorites();
                });
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
