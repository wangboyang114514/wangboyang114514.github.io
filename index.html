<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry World 2.0</title>
    <link rel="stylesheet" href="styles.css">
    <script src="interaction.js"></script>
</head>
<body>
    <div class="container">
        <img src="photo/loge.png" class="logo" alt="Logo">
        
        <!-- 标题容器，用于滑动动画 -->
        <div class="title-container">
            <p id="main-title" class="title-slide">Welcome To Chemistry World</p>
        </div>
        
        <!-- 苹果音乐风格任务栏 -->
        <div class="home-apple-taskbar">
            <button class="home-taskbar-btn" data-lang="chinese">中文</button>
            <button class="home-taskbar-btn" data-lang="english">English</button>
            <!-- 滑动指示器 -->
            <div class="home-slide-indicator"></div>
        </div>
        
        <!-- 进入网页按钮 -->
        <button id="enter-btn" class="enter-btn">进入网页</button>
        
        <h2 style="text-align:center; margin-top:60px;">
            <a href="mailto:Wangboyang8@126.com" class="feedback-btn">Feedback</a>
        </h2>
        
        <script>
            // 语言选择逻辑
            const taskbarBtns = document.querySelectorAll('.home-taskbar-btn');
            const mainTitle = document.getElementById('main-title');
            const enterBtn = document.getElementById('enter-btn');
            const slideIndicator = document.querySelector('.home-slide-indicator');
            let selectedLang = 'english';
            
            // 语言标题映射
            const titles = {
                chinese: '欢迎来到化学世界',
                english: 'Welcome To Chemistry World'
            };
            
            // 语言按钮文本映射
            const buttonTexts = {
                chinese: '进入网页',
                english: 'Enter Website'
            };
            
            // 语言页面映射
            const langPages = {
                chinese: 'elements.html',
                english: 'elements.html'
            };
            
            // 初始化
            function init() {
                // 设置默认选中状态
                slideIndicator.classList.add('english');
                // 设置默认按钮文本
                enterBtn.textContent = buttonTexts[selectedLang];
            }
            
            // 处理语言选择
            taskbarBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const newLang = this.dataset.lang;
                    if (newLang === selectedLang) return;
                    
                    // 更新选中的语言
                    selectedLang = newLang;
                    
                    // 标题滑动动画
                    mainTitle.classList.add('slide-out');
                    setTimeout(() => {
                        mainTitle.textContent = titles[selectedLang];
                        // 更新按钮文本
                        enterBtn.textContent = buttonTexts[selectedLang];
                        mainTitle.classList.remove('slide-out');
                        mainTitle.classList.add('slide-in');
                        setTimeout(() => {
                            mainTitle.classList.remove('slide-in');
                        }, 100);
                    }, 300);
                    
                    // 滑动指示器动画
                    slideIndicator.className = 'slide-indicator';
                    slideIndicator.classList.add(selectedLang);
                });
            });
            
            // 处理进入网页按钮点击
            enterBtn.addEventListener('click', function() {
                // 跳转到对应语言的页面
                window.location.href = langPages[selectedLang];
            });
            
            // 初始化
            init();
        </script>
    </div>
</body>
</html>
