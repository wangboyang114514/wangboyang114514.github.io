<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访客统计 - 化学世界后台</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>化学世界管理</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html">管理首页</a></li>
                <li><a href="carousel.html">轮播图管理</a></li>
                <li><a href="notice.html">公告管理</a></li>
                <li><a href="users.html">用户管理</a></li>
                <li><a href="stats.html" class="active">访客统计</a></li>
            </ul>
        </aside>
        
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="admin-header">
                <h1>访客统计</h1>
                <div class="user-info">
                    <span id="user-name"></span>
                    <span class="role-tag admin" id="user-role">超级管理员</span>
                    <button class="btn btn-secondary" onclick="AdminSystem.logout()">退出登录</button>
                </div>
            </header>
            
            <!-- 统计内容 -->
            <div class="stats-container">
                <!-- 概览卡片 -->
                <div class="stats-overview">
                    <div class="stat-card">
                        <div class="stat-icon">👁️</div>
                        <div class="stat-info">
                            <h3 id="total-visits">0</h3>
                            <p>总访问量</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📅</div>
                        <div class="stat-info">
                            <h3 id="today-visits">0</h3>
                            <p>今日访问</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏱️</div>
                        <div class="stat-info">
                            <h3 id="avg-duration">0秒</h3>
                            <p>平均时长</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-info">
                            <h3 id="total-duration">0分钟</h3>
                            <p>总浏览时长</p>
                        </div>
                    </div>
                </div>
                
                <!-- 每日详细统计 -->
                <div class="stats-table-container">
                    <h2>每日详细统计</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>访问次数</th>
                                <th>平均浏览时长</th>
                                <th>总浏览时长</th>
                                <th>最近浏览深度</th>
                            </tr>
                        </thead>
                        <tbody id="daily-stats-body">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 统计说明 -->
                <div class="stats-info">
                    <h3>统计说明</h3>
                    <ul>
                        <li>• 统计数据来自用户访问首页和元素页面时的记录</li>
                        <li>• 浏览时长是指用户从进入页面到离开页面的时间</li>
                        <li>• 浏览深度是指用户在页面上的最大滚动百分比</li>
                        <li>• 数据存储在本地，最多保留30天的记录</li>
                    </ul>
                </div>
                
                <!-- 清除数据按钮 -->
                <div class="stats-actions">
                    <button class="btn btn-danger" onclick="clearStats()">清除所有统计数据</button>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            if (!AdminSystem.isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }
            loadStats();
        });
        
        // 加载统计数据
        function loadStats() {
            const stats = getStats();
            const dailyStats = stats.dailyVisits || {};
            
            // 计算总访问量
            let totalVisits = 0;
            let totalDuration = 0;
            let todayVisits = 0;
            const today = new Date().toISOString().split('T')[0];
            
            for (const [date, data] of Object.entries(dailyStats)) {
                totalVisits += data.visits;
                totalDuration += data.totalDuration;
                if (date === today) {
                    todayVisits = data.visits;
                }
            }
            
            // 更新概览
            document.getElementById('total-visits').textContent = totalVisits;
            document.getElementById('today-visits').textContent = todayVisits;
            document.getElementById('avg-duration').textContent = formatDuration(
                totalVisits > 0 ? Math.round(totalDuration / totalVisits) : 0
            );
            document.getElementById('total-duration').textContent = formatDuration(totalDuration);
            
            // 更新每日统计表格
            const tbody = document.getElementById('daily-stats-body');
            tbody.innerHTML = '';
            
            // 按日期倒序排列
            const sortedDates = Object.keys(dailyStats).sort((a, b) => new Date(b) - new Date(a));
            
            if (sortedDates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">暂无统计数据</td></tr>';
            } else {
                sortedDates.slice(0, 30).forEach(date => {
                    const data = dailyStats[date];
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${date}</td>
                        <td>${data.visits} 次</td>
                        <td>${formatDuration(data.avgDuration)}</td>
                        <td>${formatDuration(data.totalDuration)}</td>
                        <td>${data.lastScrollDepth || 0}%</td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }
        
        // 获取统计数据
        function getStats() {
            const data = localStorage.getItem('visitorStats');
            return data ? JSON.parse(data) : { dailyVisits: {}, totalVisits: 0 };
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            if (seconds < 60) {
                return seconds + '秒';
            } else if (seconds < 3600) {
                return Math.round(seconds / 60) + '分钟';
            } else {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.round((seconds % 3600) / 60);
                return hours + '小时' + mins + '分钟';
            }
        }
        
        // 清除统计数据
        function clearStats() {
            if (confirm('确定要清除所有统计数据吗？此操作不可恢复。')) {
                localStorage.removeItem('visitorStats');
                loadStats();
                alert('统计数据已清除。');
            }
        }
    </script>
    
    <style>
        .stats-container {
            padding: 20px;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .stat-icon {
            font-size: 2.5rem;
        }
        
        .stat-info h3 {
            font-size: 2rem;
            margin-bottom: 4px;
            color: var(--text-primary);
        }
        
        .stat-info p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .stats-table-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        
        .stats-table-container h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        .stats-info {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
        }
        
        .stats-info h3 {
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .stats-info ul {
            list-style: none;
            color: var(--text-secondary);
            line-height: 2;
        }
        
        .stats-actions {
            text-align: center;
            padding: 20px;
        }
    </style>
</body>
</html>
