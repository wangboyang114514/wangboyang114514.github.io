<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 化学世界后台</title>
    <link rel="stylesheet" href="admin.css">
    <script src="admin.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>化学世界管理</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html">管理首页</a></li>
                <li><a href="carousel.html">轮播图管理</a></li>
                <li><a href="notice.html">公告管理</a></li>
                <li><a href="users.html" class="active">用户管理</a></li>
                <li><a href="stats.html">访客统计</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="logout-btn">退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">用户管理</h1>
                <div class="user-info">
                    <span id="user-role" class="user-role"></span>
                </div>
            </div>

            <div class="content-wrapper">
                <!-- 用户列表 -->
                <div class="card">
                    <div class="card-header">
                        <h2>用户列表</h2>
                    </div>
                    <div class="card-body">
                        <div id="user-list" class="user-list">
                            <!-- 动态生成用户列表 -->
                        </div>
                    </div>
                </div>

                <!-- 修改密码弹窗 -->
                <div id="password-modal" class="modal-overlay" style="display: none;">
                    <div class="modal">
                        <div class="modal-header">
                            <h3>修改密码</h3>
                            <button class="modal-close" onclick="closePasswordModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" id="password-user-id">
                            <div class="form-group">
                                <label for="new-password">新密码</label>
                                <input type="password" id="new-password" placeholder="请输入新密码" required>
                            </div>
                            <div class="form-group">
                                <label for="confirm-password">确认密码</label>
                                <input type="password" id="confirm-password" placeholder="请再次输入新密码" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closePasswordModal()">取消</button>
                            <button class="btn btn-primary" onclick="savePassword()">保存</button>
                        </div>
                    </div>
                </div>

                <!-- 修改用户名弹窗 -->
                <div id="username-modal" class="modal-overlay" style="display: none;">
                    <div class="modal">
                        <div class="modal-header">
                            <h3>修改用户名</h3>
                            <button class="modal-close" onclick="closeUsernameModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" id="username-old">
                            <div class="form-group">
                                <label for="new-username">新用户名</label>
                                <input type="text" id="new-username" placeholder="请输入新用户名" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closeUsernameModal()">取消</button>
                            <button class="btn btn-primary" onclick="saveUsername()">保存</button>
                        </div>
                    </div>
                </div>

                <!-- 权限设置弹窗 -->
                <div id="permission-modal" class="modal-overlay" style="display: none;">
                    <div class="modal">
                        <div class="modal-header">
                            <h3>设置权限</h3>
                            <button class="modal-close" onclick="closePermissionModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" id="permission-user-id">
                            <div class="form-group">
                                <label>选择权限</label>
                                <div id="permission-checkboxes" class="permission-checkboxes">
                                    <!-- 动态生成权限复选框 -->
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="closePermissionModal()">取消</button>
                            <button class="btn btn-primary" onclick="savePermissions()">保存</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 当前选中的用户名
        let currentUser = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            AdminSystem.init();
            loadUserList();
            updateUserInfo();
        });

        // 更新用户信息显示
        function updateUserInfo() {
            const user = AdminSystem.getCurrentUser();
            const roleElement = document.getElementById('user-role');
            if (user) {
                roleElement.textContent = user.role === 'admin' ? '超级管理员' : '访客';
            }
        }

        // 加载用户列表
        function loadUserList() {
            const users = AdminSystem.userManagement.getAllUsers();
            const userList = document.getElementById('user-list');
            
            userList.innerHTML = '';
            for (const [key, user] of Object.entries(users)) {
                const permissions = user.permissions || [];
                const canManageUsers = permissions.includes('users');
                
                // 访客不能管理用户，只显示自己的信息
                const currentUser = AdminSystem.getCurrentUser();
                if (currentUser.role !== 'admin' && key !== currentUser.username) {
                    continue;
                }
                
                const userCard = document.createElement('div');
                userCard.className = 'user-card';
                userCard.innerHTML = `
                    <div class="user-info">
                        <div class="user-avatar">${user.username.charAt(0).toUpperCase()}</div>
                        <div class="user-details">
                            <h3>${user.username}</h3>
                            <span class="role-tag ${user.role}">${user.role === 'admin' ? '超级管理员' : '访客'}</span>
                        </div>
                    </div>
                    <div class="user-permissions">
                        <div class="permission-tags">
                            ${permissions.map(p => getPermissionName(p)).join('')}
                        </div>
                    </div>
                    <div class="user-actions">
                            ${currentUser.role === 'admin' ? `
                                <button class="action-btn edit-btn" onclick="openUsernameModal('${user.username}')">修改用户名</button>
                                <button class="action-btn password-btn" onclick="openPasswordModal('${user.username}')">修改密码</button>
                                ${user.role !== 'admin' ? `<button class="action-btn permission-btn" onclick="openPermissionModal('${user.username}')">设置权限</button>` : ''}
                            ` : key === currentUser.username ? `
                                <button class="action-btn edit-btn" onclick="openUsernameModal('${user.username}')">修改用户名</button>
                                <button class="action-btn password-btn" onclick="openPasswordModal('${user.username}')">修改密码</button>
                            ` : '<span class="no-permission">无管理权限</span>'}
                        </div>
                `;
                userList.appendChild(userCard);
            }
        }

        // 获取权限名称
        function getPermissionName(permission) {
            const permissions = AdminSystem.userManagement.getAvailablePermissions();
            const found = permissions.find(p => p.key === permission);
            return found ? `<span class="permission-tag">${found.name}</span>` : '';
        }

        // 打开修改密码弹窗
        function openPasswordModal(username) {
            currentUser = username;
            document.getElementById('password-user-id').value = username;
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('password-modal').style.display = 'flex';
        }

        // 关闭修改密码弹窗
        function closePasswordModal() {
            document.getElementById('password-modal').style.display = 'none';
        }

        // 保存密码
        function savePassword() {
            const username = document.getElementById('password-user-id').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                alert('两次输入的密码不一致！');
                return;
            }

            if (newPassword.length < 6) {
                alert('密码长度不能少于6位！');
                return;
            }

            if (AdminSystem.userManagement.changePassword(username, newPassword)) {
                alert('密码修改成功！');
                closePasswordModal();
                loadUserList();
            } else {
                alert('密码修改失败！');
            }
        }

        // 打开修改用户名弹窗
        function openUsernameModal(username) {
            currentUser = username;
            document.getElementById('username-old').value = username;
            document.getElementById('new-username').value = '';
            document.getElementById('username-modal').style.display = 'flex';
        }

        // 关闭修改用户名弹窗
        function closeUsernameModal() {
            document.getElementById('username-modal').style.display = 'none';
        }

        // 保存用户名
        function saveUsername() {
            const oldUsername = document.getElementById('username-old').value;
            const newUsername = document.getElementById('new-username').value;

            if (!newUsername || newUsername.trim() === '') {
                alert('用户名不能为空！');
                return;
            }

            if (newUsername === oldUsername) {
                alert('新用户名不能与原用户名相同！');
                return;
            }

            if (AdminSystem.userManagement.changeUsername(oldUsername, newUsername)) {
                alert('用户名修改成功！');
                closeUsernameModal();
                loadUserList();
            } else {
                alert('用户名修改失败，可能用户名已存在！');
            }
        }

        // 打开权限设置弹窗
        function openPermissionModal(username) {
            currentUser = username;
            document.getElementById('permission-user-id').value = username;
            
            const permissions = AdminSystem.userManagement.getAvailablePermissions();
            const userPermissions = AdminSystem.userManagement.getPermissions(username);
            const checkboxes = document.getElementById('permission-checkboxes');
            
            checkboxes.innerHTML = permissions.map(p => `
                <label class="permission-label">
                    <input type="checkbox" name="permission" value="${p.key}" ${userPermissions.includes(p.key) ? 'checked' : ''}>
                    ${p.name}
                </label>
            `).join('');
            
            document.getElementById('permission-modal').style.display = 'flex';
        }

        // 关闭权限设置弹窗
        function closePermissionModal() {
            document.getElementById('permission-modal').style.display = 'none';
        }

        // 保存权限
        function savePermissions() {
            const username = document.getElementById('permission-user-id').value;
            const checkedBoxes = document.querySelectorAll('#permission-checkboxes input:checked');
            const permissions = Array.from(checkedBoxes).map(cb => cb.value);

            if (permissions.length === 0) {
                alert('至少需要选择一项权限！');
                return;
            }

            if (AdminSystem.userManagement.setPermissions(username, permissions)) {
                alert('权限设置成功！');
                closePermissionModal();
                loadUserList();
            } else {
                alert('权限设置失败！');
            }
        }
    </script>
</body>
</html>
